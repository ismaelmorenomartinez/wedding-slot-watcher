name: Watch Kalundborg wedding slots

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      test_notification:
        description: "Send a one-off test push and exit (verifies your phone setup)"
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

concurrency:
  group: watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watcher
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          WATCH_URLS: ${{ vars.WATCH_URLS }}
          SLOT_REGEX: ${{ vars.SLOT_REGEX }}
          TEST_NOTIFICATION: ${{ inputs.test_notification }}
        run: python watcher.py

      - name: Commit updated state
        if: ${{ !inputs.test_notification }}
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update slot state [skip ci]"
            git push
          else
            echo "No state change."
          fi
